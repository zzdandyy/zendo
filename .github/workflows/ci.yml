name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm build` runs `tsc` (strict typecheck) then `vite build` (bundle).
      - name: Typecheck and build
        run: pnpm build

      # Run the Vitest unit/component suite (`pnpm test` → `vitest run`).
      - name: Test
        run: pnpm test

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # tauri-build (build.rs) reads `frontendDist: "../dist"`, so the bundle
      # must exist before any cargo command compiles the crate.
      - name: Build frontend (provides dist for tauri-build)
        run: pnpm build

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

  # Build the runner image ONCE per CI run and warm a cross-run GitHub Actions
  # layer cache. Without this, every e2e shard would rebuild the image from
  # scratch — including the multi-minute `cargo install tauri-driver` compile —
  # i.e. 4× the expensive work on every run. Runs in parallel with frontend/rust.
  e2e-image:
    name: Build E2E runner image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Populates type=gha cache only (no load/push) — the shards reconstruct
      # the image from this cache. mode=max caches intermediate layers too, so
      # the tauri-driver/apt/npm layers survive across runs.
      - name: Build & cache runner image
        uses: docker/build-push-action@v6
        with:
          context: tests/e2e
          tags: anyscp-e2e-runner:latest
          cache-from: type=gha,scope=e2e-runner
          cache-to: type=gha,mode=max,scope=e2e-runner

  e2e:
    name: E2E shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    # Wait only for the (cached) image build — NOT for frontend/rust, which run
    # in parallel. `make e2e` rebuilds the frontend + Tauri binary inside Docker,
    # so there is no data dependency on those jobs.
    needs: e2e-image
    timeout-minutes: 60
    strategy:
      # Don't cancel the other shards when one fails — we want the full picture.
      fail-fast: false
      matrix:
        # Specs are split round-robin across these shards (see wdio.conf.ts).
        # SHARD_TOTAL below must equal the number of entries here.
        shard: [1, 2, 3, 4]
    env:
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_TOTAL: 4
      # Layer in docker-compose.ci.yml so the build-cache volumes become host
      # bind mounts under E2E_CACHE_DIR (persisted by actions/cache below).
      E2E_CI: "1"
      E2E_CACHE_DIR: ${{ github.workspace }}/.e2e-cache
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Reconstruct the runner image from the cache the e2e-image job warmed —
      # a pure cache hit, so no apt/cargo/npm work runs here. `load: true` makes
      # it available to the local Docker daemon for docker compose.
      - name: Load runner image from layer cache
        uses: docker/build-push-action@v6
        with:
          context: tests/e2e
          tags: anyscp-e2e-runner:latest
          cache-from: type=gha,scope=e2e-runner
          load: true

      # Tell the Makefile the image is current so `make e2e` skips its own
      # `docker build` (the stamp is otherwise absent on a fresh checkout).
      - name: Mark runner image as up-to-date
        run: touch tests/e2e/.image-stamp

      - name: Prepare build-cache dirs
        run: mkdir -p .e2e-cache/cargo .e2e-cache/target .e2e-cache/node-modules

      # Persist the in-container cargo registry, compiled target/, and
      # node_modules across runs. Keyed on the lockfiles so dependency builds
      # are reused even when app code changes; only the app crate recompiles.
      - name: Cache cargo / target / node_modules
        uses: actions/cache@v4
        with:
          path: .e2e-cache
          key: e2e-build-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'pnpm-lock.yaml') }}
          restore-keys: |
            e2e-build-${{ runner.os }}-

      # Brings up the SSH/SCP/MinIO target containers, compiles the Tauri debug
      # binary in-container (reusing the cache above), then runs this shard's
      # slice of the WDIO suite.
      - name: Run E2E suite (shard ${{ matrix.shard }}/4)
        run: make e2e

      # The container writes the bind-mounted cache dirs as root; hand them back
      # to the runner user so the actions/cache post-step can archive them. Runs
      # even on failure so a cold build is still cached for the next run.
      - name: Reclaim cache ownership
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" .e2e-cache
