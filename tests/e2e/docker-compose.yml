# E2E test stack: two sshd targets (password + key auth) plus the test runner.
# Run from repo root with: `make e2e`  (which calls `docker compose -f tests/e2e/docker-compose.yml ...`).

services:
  # ─── Test SSH targets ───────────────────────────────────────────────────────
  sshd-pass:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: anyscp-e2e-sshd-pass
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "true"
    networks: [e2e]

  # Passwordless-sudo target (built from tests/sudo-server). Same base as
  # sshd-pass but with a NOPASSWD sudoers rule, so the SFTP sudo-mode toggle
  # (`sudo -n sftp-server`) succeeds here. sshd-pass, by contrast, keeps
  # password-prompting sudo and exercises the toggle's failure path.
  sshd-sudo:
    build:
      context: ../sudo-server
      dockerfile: Dockerfile
    image: anyscp-test-sudo:latest
    container_name: anyscp-e2e-sshd-sudo
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "true"
    networks: [e2e]

  sshd-key:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: anyscp-e2e-sshd-key
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      USER_NAME: testuser
      PASSWORD_ACCESS: "false"
      SUDO_ACCESS: "true"
      PUBLIC_KEY_FILE: /keys/id_ed25519.pub
    volumes:
      - test-ssh-keys:/keys:ro
    networks: [e2e]
    depends_on:
      keygen:
        condition: service_completed_successfully
    healthcheck:
      # `ss` (iproute2) may not be in the image; fall back to busybox netstat so
      # the check reflects "sshd is listening on 2222" regardless of tooling.
      test: ["CMD-SHELL", "ss -ltn 2>/dev/null | grep -q :2222 || netstat -lnt 2>/dev/null | grep -q :2222"]
      interval: 2s
      timeout: 3s
      retries: 40
      start_period: 5s

  # SCP-only target — SFTP subsystem stripped (see tests/scp-server). Exercises
  # the transparent SFTP→SCP fallback: sftp_open fails here, the app retries
  # over SCP on the same connection.
  sshd-scp:
    build:
      context: ../scp-server
      dockerfile: Dockerfile
    image: anyscp-test-scp-only:latest
    container_name: anyscp-e2e-sshd-scp
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "true"
    networks: [e2e]

  # Pure-busybox SCP-only target (no GNU coreutils/findutils). Exercises the
  # busybox listing path (find -exec stat -c, since busybox find has no
  # -printf). Home is /home/testuser (vs /config on the linuxserver target).
  sshd-scp-busybox:
    build:
      context: ../scp-server-busybox
      dockerfile: Dockerfile
    image: anyscp-test-scp-busybox:latest
    container_name: anyscp-e2e-sshd-scp-busybox
    networks: [e2e]

  # Stripped-busybox SCP-only target — busybox with NO `stat` applet (and no GNU
  # tools). Reproduces issue #3 (Buildroot 2020.02.1): neither `stat -c` nor
  # `stat -f` exists, so listing must fall through to the universal `ls -la`
  # Posix path. Without that fallback the Explorer connects but lists no files.
  sshd-scp-busybox-nostat:
    build:
      context: ../scp-server-busybox-nostat
      dockerfile: Dockerfile
    image: anyscp-test-scp-busybox-nostat:latest
    container_name: anyscp-e2e-sshd-scp-busybox-nostat
    networks: [e2e]

  # ─── ProxyJump / tunnel pair ────────────────────────────────────────────────
  # Proves a connection is genuinely tunnelled. `sshd-bastion` bridges the
  # runner-reachable `e2e` network and an isolated `e2e-internal` network.
  # `sshd-tunnel-target` lives ONLY on `e2e-internal`, so the runner shares no
  # network with it and cannot resolve or reach it directly — a working shell on
  # it can only mean the connection was tunnelled through the bastion. Distinct
  # hostnames let the test assert which host the shell actually landed on.
  # NB: the tunnel opens a `direct-tcpip` channel on the bastion, which needs
  # `AllowTcpForwarding yes`. The stock linuxserver image ships it as `no`, so the
  # bastions are built from tests/bastion-server (which flips it on). Targets are
  # endpoints (they don't forward), so they keep the stock image.
  sshd-bastion:
    build:
      context: ../bastion-server
      dockerfile: Dockerfile
    image: anyscp-test-bastion:latest
    container_name: anyscp-e2e-sshd-bastion
    hostname: anyscp-bastion
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "true"
    networks: [e2e, e2e-internal]

  sshd-tunnel-target:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: anyscp-e2e-sshd-tunnel-target
    hostname: anyscp-tunnel-target
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "true"
    # Intentionally NOT on `e2e` → unreachable from the runner except via the
    # bastion tunnel. The runner can't TCP-probe it, so readiness is gated by a
    # healthcheck + `service_healthy` rather than the entrypoint's wait_for.
    networks: [e2e-internal]
    healthcheck:
      # `ss` (iproute2) may not be in the image; fall back to busybox netstat so
      # the check reflects "sshd is listening on 2222" regardless of tooling.
      test: ["CMD-SHELL", "ss -ltn 2>/dev/null | grep -q :2222 || netstat -lnt 2>/dev/null | grep -q :2222"]
      interval: 2s
      timeout: 3s
      retries: 40
      start_period: 5s

  # ─── Multi-hop (chained bastion) pair ───────────────────────────────────────
  # Proves a connection traverses MORE THAN ONE jump. A second bastion bridges
  # `e2e-internal` (shared with bastion1) and a third network `e2e-internal2`;
  # `sshd-deep-target` lives only on `e2e-internal2`. So the only path is
  #   runner → sshd-bastion (e2e) → sshd-bastion2 (e2e-internal) → sshd-deep-target (e2e-internal2).
  # Neither bastion2 nor the deep target is on `e2e`, so the runner can't reach
  # either directly — this would FAIL on the old single-hop code, which tried to
  # connect to the immediate jump (bastion2) directly.
  sshd-bastion2:
    build:
      context: ../bastion-server
      dockerfile: Dockerfile
    image: anyscp-test-bastion:latest
    container_name: anyscp-e2e-sshd-bastion2
    hostname: anyscp-bastion2
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "true"
    networks: [e2e-internal, e2e-internal2]
    healthcheck:
      # `ss` (iproute2) may not be in the image; fall back to busybox netstat so
      # the check reflects "sshd is listening on 2222" regardless of tooling.
      test: ["CMD-SHELL", "ss -ltn 2>/dev/null | grep -q :2222 || netstat -lnt 2>/dev/null | grep -q :2222"]
      interval: 2s
      timeout: 3s
      retries: 40
      start_period: 5s

  sshd-deep-target:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: anyscp-e2e-sshd-deep-target
    hostname: anyscp-deep-target
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      USER_NAME: testuser
      USER_PASSWORD: testpass
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "true"
    networks: [e2e-internal2]
    healthcheck:
      # `ss` (iproute2) may not be in the image; fall back to busybox netstat so
      # the check reflects "sshd is listening on 2222" regardless of tooling.
      test: ["CMD-SHELL", "ss -ltn 2>/dev/null | grep -q :2222 || netstat -lnt 2>/dev/null | grep -q :2222"]
      interval: 2s
      timeout: 3s
      retries: 40
      start_period: 5s

  # ─── S3-compatible storage (MinIO) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: anyscp-e2e-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks: [e2e]

  # One-shot bucket seed — creates the test bucket and uploads two objects
  # so the S3 explorer specs have something to render.
  minio-seed:
    image: minio/mc:latest
    container_name: anyscp-e2e-minio-seed
    depends_on:
      minio:
        condition: service_started
    networks: [e2e]
    entrypoint:
      - sh
      - -c
      - |
        set -e
        until mc alias set m http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do
          echo "waiting for minio..."; sleep 1
        done
        mc mb --ignore-existing m/anyscp-test >/dev/null
        echo "hello from minio" | mc pipe m/anyscp-test/hello.txt >/dev/null
        echo "{\"k\": 1}"        | mc pipe m/anyscp-test/data.json >/dev/null
        echo "minio seeded"

  # One-shot keygen — produces the keypair shared by sshd-key (authorized key)
  # and the e2e runner (private key for connecting).
  keygen:
    image: alpine:3.20
    container_name: anyscp-e2e-keygen
    command:
      - sh
      - -c
      - |
        set -e
        if [ ! -f /keys/id_ed25519 ]; then
          apk add --no-cache openssh-keygen >/dev/null
          ssh-keygen -t ed25519 -f /keys/id_ed25519 -N '' -C 'anyscp-e2e'
          chmod 600 /keys/id_ed25519
          chmod 644 /keys/id_ed25519.pub
        fi
        ls -l /keys
    volumes:
      - test-ssh-keys:/keys

  # ─── Test runner ────────────────────────────────────────────────────────────
  e2e:
    build:
      context: .
      dockerfile: Dockerfile
    image: anyscp-e2e-runner:latest
    container_name: anyscp-e2e-runner
    # The entrypoint's wait_for() polls TCP on each sshd before launching
    # WDIO, so we just need the containers started, not health-checked.
    depends_on:
      sshd-pass:
        condition: service_started
      sshd-sudo:
        condition: service_started
      sshd-key:
        condition: service_started
      sshd-scp:
        condition: service_started
      sshd-scp-busybox:
        condition: service_started
      sshd-scp-busybox-nostat:
        condition: service_started
      sshd-bastion:
        condition: service_started
      sshd-tunnel-target:
        condition: service_healthy
      sshd-bastion2:
        condition: service_healthy
      sshd-deep-target:
        condition: service_healthy
      minio-seed:
        condition: service_completed_successfully
    environment:
      SSHD_PASS_HOST: sshd-pass
      SSHD_PASS_PORT: "2222"
      SSHD_SUDO_HOST: sshd-sudo
      SSHD_SUDO_PORT: "2222"
      SSHD_KEY_HOST: sshd-key
      SSHD_KEY_PORT: "2222"
      SSHD_SCP_HOST: sshd-scp
      SSHD_SCP_PORT: "2222"
      SSHD_SCP_BUSYBOX_HOST: sshd-scp-busybox
      SSHD_SCP_BUSYBOX_PORT: "2222"
      SSHD_SCP_BUSYBOX_NOSTAT_HOST: sshd-scp-busybox-nostat
      SSHD_SCP_BUSYBOX_NOSTAT_PORT: "2222"
      # ProxyJump pair: bastion is runner-reachable; the tunnel target is not.
      SSHD_BASTION_HOST: sshd-bastion
      SSHD_BASTION_PORT: "2222"
      SSHD_TUNNEL_TARGET_HOST: sshd-tunnel-target
      SSHD_TUNNEL_TARGET_PORT: "2222"
      # Multi-hop chain: target behind bastion2 behind bastion1.
      SSHD_BASTION2_HOST: sshd-bastion2
      SSHD_BASTION2_PORT: "2222"
      SSHD_DEEP_TARGET_HOST: sshd-deep-target
      SSHD_DEEP_TARGET_PORT: "2222"
      SSH_USER: testuser
      SSH_PASS: testpass
      SSH_KEY_PATH: /keys/id_ed25519
      # MinIO sidecar — S3-compatible target seeded by minio-seed.
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: anyscp-test
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      # Don't ship test-run noise to PostHog. Read by src-tauri/src/telemetry.rs;
      # `init()` is a no-op when this is set, so no events are emitted.
      ANYSCP_DISABLE_TELEMETRY: "1"
      # Force-rebuild the binary on every run: set to 1
      E2E_FORCE_BUILD: ""
      # WDIO log level
      LOG_LEVEL: warn
      # Spec sharding across parallel CI runners (see wdio.conf.ts). Passed
      # through from the host env; empty/unset runs the full suite.
      SHARD_INDEX: ${SHARD_INDEX:-}
      SHARD_TOTAL: ${SHARD_TOTAL:-}
    volumes:
      - ../..:/workspace                            # repo source (rw, so we can build)
      - cargo-cache:/root/.cargo/registry           # persist crate downloads
      - rust-target:/workspace/src-tauri/target     # persist build artifacts
      - node-modules:/workspace/node_modules        # persist top-level node_modules
      - test-ssh-keys:/keys:ro                      # shared keypair
    networks: [e2e]
    ports:
      - "5900:5900"   # x11vnc — connect with a VNC client to watch tests live
    init: true
    # tauri-driver spawns WebKitWebDriver; SYS_ADMIN avoids sandbox/seccomp issues.
    cap_add: [SYS_ADMIN]
    # Disable seccomp so the kernel keyring syscalls (keyctl, add_key,
    # request_key) the keyutils backend needs aren't filtered. Docker's
    # default profile blocks `keyctl_join_session_keyring` regardless of
    # capabilities. This is a test-only container — security trade-off is fine.
    security_opt:
      - seccomp:unconfined

networks:
  e2e:
  # Isolated tier for the ProxyJump target. Isolation comes from the runner NOT
  # being attached (Docker doesn't route between separate bridge networks, and
  # its embedded DNS only resolves names within shared networks) — NOT from
  # `internal: true`. We deliberately avoid `internal: true` because it blocks
  # the linuxserver image's first-boot init (which needs internet), leaving sshd
  # unhealthy. The target still can't be reached from the runner.
  e2e-internal:
  # Second tier for the multi-hop chain. Only bastion2 and the deep target sit
  # here, so reaching the deep target requires hopping bastion1 → bastion2
  # (neither bastion1 nor the runner is attached).
  e2e-internal2:

volumes:
  cargo-cache:
  rust-target:
  node-modules:
  test-ssh-keys:
